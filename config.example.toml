# Voice2Text Configuration Template
# This file defines the behavior of the transcription engine and UI.

[hotkeys]
# The key combination used to trigger dictation.
hotkey = "ctrl+alt+v"
# If true, you must hold the key to talk. If false, it's a toggle (click to start, click to stop).
hold_mode = false

[interaction]
# Automatically cancel and discard transcription if you click away from the active window.
cancel_on_click_outside_anchor = true
# 'control' for specific input fields, 'window' for any click outside the app window.
anchor_scope = "control"
# If true, the app will add itself to the Windows Registry to run on system boot.
run_at_startup = false

[interaction.sounds]
# Auditory feedback when recording starts or stops.
enabled = true
volume = 0.5
# start_sound_path = "C:\\Windows\\Media\\Speech On.wav"
# stop_sound_path = "C:\\Windows\\Media\\Speech Off.wav"

[ui.floating_indicator]
# The Win+H style HUD that shows partial transcripts.
enabled = true
# Click-through makes the HUD ignore mouse events so it doesn't block your workspace.
click_through = true

[audio]
# 'warm' (recommended) keeps the connection ready but idle to reduce latency on first press.
# 'on_demand' connects only when the hotkey is pressed (higher latency).
# 'always_on' never disconnects (highest resource usage).
connection_mode = "warm"

[transcription]
# Active provider: "openai" or "assemblyai"
provider = "openai"
# Profiles: "fast" (low latency), "balanced" (standard), "accurate" (longer silence wait)
latency_profile = "balanced"
# Mic optimization: "headset" (directional), "laptop" (ambient), "none" (raw)
mic_profile = "headset"
# If true, the provider will attempt to add punctuation and capitalization.
format_text = false

# --- ADVANCED CONFIGURATION (Optional) ---
# Do not modify these values unless you have specific hardware or performance requirements.

# [audio]
