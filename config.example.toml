# Voice2Text Configuration Template
# All values shown below are the defaults. Commented out lines will be ignored,
# and the application will use the built-in defaults.

# Initial transcription provider to use ("openai" or "assemblyai")
# default_provider = "openai"

[hotkeys]
# Global hotkey for triggering transcription
# hotkey = "ctrl+alt+v"
# If true, listen while holding. If false, toggle with a press.
# hold_mode = true

[interaction]
# Enable/Disable cancelling dictation when clicking outside the target control
# cancel_on_click_outside_anchor = true
# Scope: "control" (target widget) or "window" (whole application)
# anchor_scope = "control"

[interaction.sounds]
# Enable subtle auditory feedback for start/stop events
# enabled = true
# Playback volume (0.0 to 1.0)
# volume = 0.5
# Built-in sound asset paths
# start_sound_path = "assets/sounds/start.wav"
# stop_sound_path = "assets/sounds/stop.wav"

[ui.floating_indicator]
# Enable/Disable the small floating circle that pulses while recording
# enabled = true
# Opacity when not recording (0.0 to 1.0)
# opacity_idle = 0.3
# Max opacity during pulse while recording
# opacity_active = 0.8
# Screen coordinates
# x = 500
# y = 50

# Provider-agnostic capture settings
[audio]
# capture_sample_rate = 16000
# Duration of each audio chunk sent to the provider (in milliseconds)
# chunk_ms = 100

[transcription]
# Default language for transcription
# language = "en"
# sample_rate = 16000

[test]
# Enable mock transcription for testing without using real API credits
# enabled = false
# openai_mock_url = "ws://localhost:8081"
# assemblyai_mock_url = "ws://localhost:8081"

