# Voice2Text Configuration Template

# Initial transcription provider to use ("openai" or "assemblyai")
default_provider = "openai"

[hotkeys]
# Global hotkey for triggering transcription
hotkey = "ctrl+alt+v"
# If true, listen while holding. If false, toggle with a press.
hold_mode = true

[transcription]
# Target language for transcription
language = "en"
# Audio sample rate in Hz (16000 is recommended for most providers)
sample_rate = 16000

[test]
# Enable mock transcription for testing without using real API credits
enabled = false
# Mock WebSocket URL for OpenAI
openai_mock_url = "ws://localhost:8081"
# Mock WebSocket URL for AssemblyAI
assemblyai_mock_url = "ws://localhost:8081"

[advanced]
# Production WebSocket URL for OpenAI Realtime API
openai_url = "wss://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-10-01"
# Production WebSocket URL for AssemblyAI Realtime API
assemblyai_url = "wss://api.assemblyai.com/v2/realtime/ws"