name: Release (Windows exe)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 0.2.26)"
        required: true
        type: string
      summary:
        description: "High-level summary (Prepended to autogenerated notes)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Lint, Type Check & Test"
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --locked --group dev

      - name: Lint (Ruff)
        run: uv run --locked ruff check .

      - name: Type Check (Mypy)
        run: uv run --locked mypy .

      - name: Run Tests
        run: uv run --locked pytest -q

  release:
    name: "Build & Publish EXE"
    needs: [test]
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --locked --group dev

      - name: Validate requested version and tag state
        id: meta
        shell: pwsh
        run: |
          $requested = "${{ github.event.inputs.version }}".Trim()

          if ($requested.StartsWith("v")) {
            throw "Enter the version without a leading 'v'. Example: 0.2.26"
          }

          $ver = (Get-Content pyproject.toml | Select-String '^version = "(.*)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          if (-not $ver) {
            throw "Could not read version from pyproject.toml"
          }

          if ($requested -ne $ver) {
            throw "Requested version $requested does not match pyproject.toml version $ver"
          }

          git fetch --tags --force
          $tag = "v$requested"
          $existing = git tag -l $tag
          if ($existing) {
            throw "Tag $tag already exists"
          }

          $sha = git rev-parse HEAD

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$requested" >> $env:GITHUB_OUTPUT
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Build exe
        run: .\scripts\build_onefile.ps1

      - name: Build Installer (Inno Setup)
        shell: pwsh
        run: |
          iscc packaging\inno\parrotink.iss

      - name: Compute checksum
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 dist\ParrotInk.exe |
            ForEach-Object { "$($_.Hash) ParrotInk.exe" } |
            Out-File -Encoding ascii dist\ParrotInk.exe.sha256

          Get-FileHash -Algorithm SHA256 dist\ParrotInk-Setup.exe |
            ForEach-Object { "$($_.Hash) ParrotInk-Setup.exe" } |
            Out-File -Encoding ascii dist\ParrotInk-Setup.exe.sha256

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.sha }}
          body: ${{ github.event.inputs.summary }}
          generate_release_notes: true
          files: |
            dist/ParrotInk.exe
            dist/ParrotInk.exe.sha256
            dist/ParrotInk-Setup.exe
            dist/ParrotInk-Setup.exe.sha256
