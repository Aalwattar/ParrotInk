changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - octocat
  categories:
    - title: "🚀 Features & UI Updates"
      labels:
        - feature
        - feat
        - enhancement
    - title: "🐛 Bug Fixes & Stability"
      labels:
        - bug
        - fix
    - title: "🛠️ Maintenance & CI/CD"
      labels:
        - chore
        - refactor
        - build
        - ci
    - title: "📝 Documentation"
      labels:
        - documentation
        - docs
