name: CI & Release (Windows)

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    name: "Lint, Type Check & Test"
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --locked --group dev

      - name: Lint (Ruff)
        run: uv run --locked ruff check .

      - name: Type Check (Mypy)
        run: uv run --locked mypy .

      - name: Run Tests
        run: uv run --locked pytest -q

  release:
    name: "Build & Publish EXE"
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Verify tag matches pyproject.toml version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $ver = (Get-Content pyproject.toml | Select-String '^version = "(.*)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          if ($tag -ne $ver) { throw "Tag v$tag does not match app version $ver" }

      - name: Build exe
        run: .\scripts\build_onefile.ps1

      - name: Compute checksum
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 dist/ParrotInk.exe | ForEach-Object { "$($_.Hash) ParrotInk.exe" } | Out-File -Encoding ascii dist/ParrotInk.exe.sha256

      - name: Create/Update GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ParrotInk.exe
            dist/ParrotInk.exe.sha256
